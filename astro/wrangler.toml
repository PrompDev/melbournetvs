name = "melbournetvs"
compatibility_date = "2026-07-19"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[env.production.r2_buckets]]
binding = "LEAD_UPLOADS"
bucket_name = "melbournetvs-lead-uploads"

[[env.production.d1_databases]]
binding = "OPERATIONS_DB"
database_name = "melbournetvs-operations"
database_id = "76971043-7ad7-467b-b8a1-d6d57aeab44b"

# GOOGLE_APPS_SCRIPT_URL and other operational settings are added only after
# their Melbourne-specific services have been authorised and verified.
